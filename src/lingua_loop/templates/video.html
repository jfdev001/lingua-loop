<!DOCTYPE html>

<header>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
</header>

<body>
    <div class="player-card">

        <!-- Notice -->
        <div class="notice-bar">
            <span class="notice-icon">Note</span>
            <p class="notice-text">
                <strong>Use a local file or CodeSandbox</strong> — CodePen blocks YouTube autoplay (even muted) and
                sometimes blocks the YouTube JS API communication entirely.
            </p>
        </div>

        <!-- Video -->
        <div class="video-wrapper">
            <div id="player"></div>
            <div class="overlay-play" id="overlayPlay">
                <i class="fas fa-play"></i>
            </div>

            <!-- Controls -->
            <div class="controls-bar">

                <button id="playPauseBtn" class="btn" title="Play / Pause (Space)">
                    <i class="fas fa-play"></i>
                </button>

                <div class="ctrl-sep"></div>

                <div class="volume-container">
                    <button id="muteBtn" class="btn" title="Mute (M)">
                        <i class="fas fa-volume-high"></i>
                    </button>
                    <input type="range" id="volumeSlider" class="slider" min="0" max="100" value="100" />
                </div>

                <div class="ctrl-sep"></div>

                <div class="seek-container">
                    <input type="range" id="seekBar" class="slider" min="0" max="100" value="0" />
                </div>

                <span class="time">
                    <span id="currentTime">0:00</span>
                    <span>/</span>
                    <span id="duration">0:00</span>
                </span>

                <div class="ctrl-sep"></div>

                <select id="playbackSpeed" class="control-select" title="Playback speed">
                    <option value="0.5">0.5×</option>
                    <option value="1" selected>1×</option>
                    <option value="1.5">1.5×</option>
                    <option value="2">2×</option>
                </select>

                <button id="fullscreenBtn" class="fullscreen-btn" title="Fullscreen (F)">
                    <i class="fas fa-expand"></i>
                </button>

            </div>
        </div>
    </div>

    <script src="/static/example.js"></script>
</body>
