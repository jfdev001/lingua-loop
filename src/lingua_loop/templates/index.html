<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LinguaLoop</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <h1>LinguaLoop</h1>

    <div class="app">
        <!-- Language radio buttons -->
        <form>
            <label>Language to Transcribe:</label><br>
            {% for language, language_code in language_to_language_code.items() %}
            <label>
                <input type="radio" name="language" value="{{ language_code }}" {% if language_code == 'en' %}checked{% endif %}  >
                {{ language }}
            </label><br>
            {% endfor %}
        </form>

        <!-- NOTE: Width of any written fields should probably be max available -->

        <!-- Input video -->
        <div>
            <label for="videoUrl">Enter YouTube Video URL:</label><br>

            <input type="text" id="videoUrl" placeholder="Paste YouTube link here..."
                style="width: 400px; padding: 8px;" />

            <button id="loadVideoBtn">
                Load Video
            </button>
        </div>

        <!-- Loading indicator -->
        <div id="loadingIndicator" style="display: none;">
          ⏳ Loading transcripts...
        </div>

        <!-- Video player  -->
        <div id="player"></div>

        <!-- n segments -->
        <!-- TODO: you should specify total num seconds and fuzzy match the num segments!-->
        <div style="margin-top: 20px;">
            <label for="numSegments">Number of segments to transcribe:</label><br><br>

            <input
                type="number"
                id="numSegments"
                min="1"
                step="1"
                value="1"
                style="width: 80px; padding: 6px;"
            />
        </div>

        <!-- Ready to transcribe -->
        <button id="startTranscriptionBtn" class="primary-btn">
            ▶️ Snap to Segment & Transcribe
        </button>

        <!-- Transcript input -->
        <div>
            <textarea
                id="userText"
                placeholder="Type what you hear..."
                rows="3"
                cols="60">
            </textarea>
            <button>Submit</button>
        </div>

        <!-- Reference  -->
        <div>
            <textarea id="referenceText" placeholder="Reference text will appear here..." rows="3" cols="60"
                readonly></textarea>
        </div>

    </div>

    <script>
        window.APP_CONFIG = {
            language_to_language_code: {{language_to_language_code | tojson}}
        };
    </script>
    <script src="/static/app.js"></script>
</body>

</html>
