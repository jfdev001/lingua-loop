<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <!-- <meta name="viewport" content="width=device-width, initial-scale=1"> -->
  <title>LinguaLoop</title>
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"> -->
  <link rel="icon" href="/static/favicon.ico">

</head>

<body>
  <h1>LinguaLoop</h1>

  <!-- Input YouTube Video ID -->
  <div>
    <input type="text" id="videoUrl" placeholder="Enter YouTube video URL">
    <button onclick="loadVideo()">Load Video</button>
  </div>

  <!-- Video container -->
  <div id="videoContainer" style="margin-top: 20px;"></div>

  <!-- Transcript input -->
  <div style="margin-top: 20px;">
    <textarea id="userText" placeholder="Type what you hear..." rows="3" cols="60"></textarea>
    <button onclick="submitSegment()">Submit</button>
  </div>

  <!-- Feedback -->
  <div id="feedback" style="margin-top: 20px; font-weight: bold;"></div>

  <script src="/static/app.js"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script> -->
</body>

</html>
