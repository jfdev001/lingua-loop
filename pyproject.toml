[project]
name = "lingua-loop"
version = "0.1.0"
description = "Language Learning in an Active Loop"
readme = "README.md"
license = "MIT"
license-files = [ "LICENSE" ]
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.135.1",
]

# TODO: verify these...
[project.scripts]
lingua-loop = "lingua_loop.main:run"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
lingua_loop = ["templates/*", "static/*"]
