[project]
name = "lingua-loop"
version = "0.1.0"
description = "Language Learning in an Active Loop"
readme = "README.md"
license = "MIT"
license-files = [ "LICENSE" ]
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.22.1",
    "fastapi[standard]>=0.135.1",
    "sqlalchemy>=2.0.48",
    "youtube-transcript-api>=1.2.4",
]

[project.scripts]
lingua-loop = "lingua_loop.main:run"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
lingua_loop = ["templates/*", "static/*"]

[dependency-groups]
dev = [
    "lingua-loop",
    "pytest>=9.0.2",
]
