[project]
name = "lingua-loop"
version = "0.1.0"
description = "Language Learning in an Active Loop"
readme = "README.md"
license = "MIT"
license-files = [ "LICENSE" ]
requires-python = ">=3.12"
dependencies = [
    "aiosqlite>=0.22.1",
    "fastapi[standard]>=0.135.1",
    "sqlalchemy>=2.0.48",
    "youtube-transcript-api>=1.2.4",
]

[project.scripts]
lingualoop = "lingua_loop.scripts.run:run"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
lingua_loop = ["templates/*", "static/*"]

[tool.pytest.ini_options]
pythonpath = ["."]

[dependency-groups]
dev = [
    "hypothesis>=6.151.10",
    "prek>=0.3.8",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-skip-slow>=0.0.5",
    "schemathesis>=4.14.2",
]
